<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELAI — Links</title>
<meta name="description" content="VELAI — AI virtual creator · Fashion & Beauty ดูแพงในงบของเรา · ของเด็ดที่เลือกมาแล้วสัปดาห์นี้">
<style>
  :root {
    --bg: #faf6ee;
    --card: #ffffff;
    --ink: #3d3528;
    --ink2: #8a7d68;
    --ink3: #a89a82;
    --clay: #c8775a;
    --clay-dark: #b0654a;
    --line: #efe2cf;
    --soft: #f1e7d6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Sukhumvit Set", -apple-system, "Helvetica Neue", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 18px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { width: 100%; max-width: 420px; text-align: center; }

  .avatar {
    width: 92px; height: 92px; border-radius: 50%;
    border: 3px solid #fff; outline: 1px solid var(--line);
    margin: 0 auto 12px; overflow: hidden; background: var(--soft);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

  h1 { font-size: 21px; letter-spacing: 5px; color: var(--ink); font-weight: 600; }
  .tagline { color: var(--ink2); font-size: 13px; margin: 7px 0 3px; }
  .promise { color: var(--clay); font-size: 13px; font-weight: 600; margin-bottom: 12px; }
  .ai-badge {
    display: inline-block; font-size: 11px; color: var(--ink2);
    background: var(--soft); border-radius: 999px; padding: 4px 13px; margin-bottom: 20px;
  }

  .social { display: flex; gap: 8px; margin-bottom: 22px; }
  .social a {
    flex: 1; text-decoration: none; border-radius: 11px;
    padding: 11px 0; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .social .pin { background: var(--clay); color: #fff; }
  .social .pin:hover { background: var(--clay-dark); }
  .social .ig { background: #fff; border: 1px solid var(--line); color: #6b5f4d; }
  .social .ig:hover { border-color: var(--clay); color: var(--clay); }
  .social svg { width: 16px; height: 16px; }

  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; }
  .chip {
    background: #fff; border: 1px solid var(--line); color: #6b5f4d;
    font-size: 12px; padding: 6px 14px; border-radius: 999px; cursor: pointer;
    transition: all .12s ease;
  }
  .chip:hover { border-color: var(--clay); }
  .chip.active { background: var(--clay); color: #fff; border-color: var(--clay); }

  .sec-head {
    display: flex; align-items: center; gap: 8px; margin: 4px 0 12px; text-align: left;
  }
  .sec-head .lbl { color: var(--clay-dark); font-size: 12px; letter-spacing: 1px; font-weight: 600; white-space: nowrap; }
  .sec-head .rule { flex: 1; height: 1px; background: var(--line); }
  .sec-head .wk { color: var(--ink3); font-size: 11px; }

  .card {
    display: flex; gap: 12px; text-decoration: none; color: var(--ink);
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 11px; margin-bottom: 10px; text-align: left;
    transition: transform .14s ease, border-color .14s ease;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--clay); }
  .card .thumb, .card .ph {
    width: 60px; height: 60px; border-radius: 10px; flex-shrink: 0;
    object-fit: cover; display: block;
  }
  .card .ph {
    background: linear-gradient(150deg, #fbe9d8, #f0d4bb);
    display: flex; align-items: center; justify-content: center;
  }
  .card .ph svg { width: 24px; height: 24px; color: var(--clay); opacity: .8; }
  .card .cbody { flex: 1; min-width: 0; }
  .card .cname { font-size: 13.5px; font-weight: 600; line-height: 1.35; }
  .card .cmeta { display: flex; justify-content: space-between; align-items: baseline; margin-top: 5px; }
  .card .price { color: var(--clay); font-size: 16px; font-weight: 700; }
  .card .rate { color: var(--ink2); font-size: 11px; }
  .card .cnote { color: var(--ink3); font-size: 11px; margin-top: 5px; line-height: 1.4; }

  details.archive { margin-bottom: 8px; }
  details.archive > summary {
    list-style: none; cursor: pointer;
    background: #fbf7f0; border: 1px solid var(--line); border-radius: 11px;
    padding: 12px 14px; display: flex; justify-content: space-between; align-items: center;
    font-size: 12.5px; color: #6b5f4d;
  }
  details.archive > summary::-webkit-details-marker { display: none; }
  details.archive > summary .cnt { color: var(--ink3); font-size: 11px; }
  details.archive[open] > summary { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  details.archive .inner { padding-top: 10px; }
  .arch-title { color: var(--ink3); font-size: 11px; letter-spacing: 1px; margin: 22px 0 10px; text-align: left; }

  .disclosure { color: var(--ink3); font-size: 11px; margin-top: 30px; line-height: 1.7;
    border-top: 1px solid var(--line); padding-top: 14px; text-align: left; }
  .empty { color: var(--ink2); font-size: 13px; padding: 24px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="avatar"><img src="img/avatar.jpg" alt="VELAI" onerror="this.parentNode.textContent='V';this.parentNode.style.cssText+=';display:flex;align-items:center;justify-content:center;color:#c8775a;font-size:34px;font-weight:600'"></div>
  <h1>VELAI</h1>
  <div class="tagline">Fashion &amp; Beauty · ดูแพงในงบของเรา</div>
  <div class="promise">ไม่ต้องแพง แค่เลือกเป็น</div>
  <div class="ai-badge">AI virtual creator</div>

  <div class="social" id="socials"></div>
  <div class="chips" id="chips"></div>

  <div id="content"><div class="empty">กำลังโหลด...</div></div>

  <div class="disclosure">
    ลิงก์สินค้าเป็น affiliate link — VELAI ได้รับค่าแนะนำจาก Shopee หากซื้อผ่านลิงก์
    โดยราคาที่คุณจ่ายเท่าเดิม · สินค้าคัดจากเรตติ้งและยอดขายจริง ไม่ใช่รีวิวจากการใช้งาน
  </div>
</div>

<script>
const PIN_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12c0 4.2 2.6 7.8 6.2 9.3-.1-.8-.2-2 0-2.9l1.2-5s-.3-.6-.3-1.5c0-1.4.8-2.4 1.8-2.4.9 0 1.3.6 1.3 1.4 0 .9-.5 2.2-.8 3.4-.2 1 .5 1.8 1.5 1.8 1.8 0 3.1-2.3 3.1-5 0-2.1-1.4-3.6-3.9-3.6-2.9 0-4.6 2.1-4.6 4.4 0 .9.3 1.5.8 2 .2.3.3.4.2.7l-.3 1.1c-.1.4-.4.5-.7.4-1.4-.6-2-2.1-2-3.8 0-2.8 2.4-6.2 7-6.2 3.7 0 6.2 2.7 6.2 5.6 0 3.8-2.1 6.6-5.2 6.6-1 0-2-.6-2.4-1.2l-.6 2.5c-.2.8-.7 1.9-1.1 2.5.9.3 1.8.4 2.8.4 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>';
const IG_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>';
const BAG_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 7h12l-1 13H7L6 7z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg>';

const CAT_TH = { beauty:"บิวตี้", fashion:"แฟชั่น", home:"ของใช้", food:"กินเล่น", gadget:"แกดเจ็ต" };
const MAX_WEEKS = 6;
let STATE = { products: [], cat: "all", current: null };

const wkNum = w => "W" + (String(w).split("-W")[1] || w);

function cardHTML(p) {
  const thumb = p.image
    ? `<img class="thumb" src="${p.image}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;ph&quot;>'+BAG_SVG+'</div>'">`
    : `<div class="ph">${BAG_SVG}</div>`;
  const meta = [p.rating ? "★ " + p.rating : "", p.sold ? "ขาย " + p.sold : ""].filter(Boolean).join(" · ");
  const note = (p.note ? p.note + " · " : "") + "ซื้อใน Shopee →";
  return `<a class="card" href="${p.link}" target="_blank" rel="noopener sponsored nofollow">
    ${thumb}
    <div class="cbody">
      <div class="cname">${p.name}</div>
      <div class="cmeta"><span class="price">฿${Number(p.price).toLocaleString()}</span><span class="rate">${meta}</span></div>
      <div class="cnote">${note}</div>
    </div></a>`;
}

function render() {
  const el = document.getElementById("content");
  let items = STATE.products.filter(p => p.link && !String(p.link).includes("..."));
  if (STATE.cat !== "all") items = items.filter(p => p.category === STATE.cat);

  if (!items.length) {
    el.innerHTML = '<div class="empty">หมวดนี้ยังไม่มีของแนะนำ — ตามดูใน Instagram ก่อนนะ</div>';
    return;
  }

  const byWeek = {};
  items.forEach(p => { (byWeek[p.week] = byWeek[p.week] || []).push(p); });
  const weeks = Object.keys(byWeek).sort().reverse().slice(0, MAX_WEEKS);
  const current = STATE.current && weeks.includes(STATE.current) ? STATE.current : weeks[0];

  let html = "";
  const hero = byWeek[current] || [];
  html += `<div class="sec-head"><span class="lbl">ของเด็ดสัปดาห์นี้</span><span class="rule"></span><span class="wk">${wkNum(current)}</span></div>`;
  html += hero.map(cardHTML).join("");

  const past = weeks.filter(w => w !== current);
  if (past.length) {
    html += `<div class="arch-title">คลังที่ผ่านมา</div>`;
    past.forEach(w => {
      const list = byWeek[w];
      html += `<details class="archive"><summary>สัปดาห์ ${wkNum(w)}<span class="cnt">${list.length} ชิ้น ▾</span></summary><div class="inner">${list.map(cardHTML).join("")}</div></details>`;
    });
  }
  el.innerHTML = html;
}

function buildChips() {
  const el = document.getElementById("chips");
  const cats = [...new Set(STATE.products.map(p => p.category).filter(Boolean))];
  if (STATE.products.length <= 6 || cats.length <= 1) { el.innerHTML = ""; return; }
  const mk = (val, label) => `<span class="chip${STATE.cat === val ? " active" : ""}" data-cat="${val}">${label}</span>`;
  el.innerHTML = mk("all", "ทั้งหมด") + cats.map(c => mk(c, CAT_TH[c] || c)).join("");
  el.querySelectorAll(".chip").forEach(c => c.onclick = () => { STATE.cat = c.dataset.cat; buildChips(); render(); });
}

fetch("products.json?t=" + Date.now())
  .then(r => r.json())
  .then(data => {
    const s = data.socials || {};
    const links = [];
    if (s.pinterest) links.push(`<a class="pin" href="${s.pinterest}" target="_blank" rel="noopener">${PIN_SVG}Pinterest</a>`);
    if (s.instagram) links.push(`<a class="ig" href="${s.instagram}" target="_blank" rel="noopener">${IG_SVG}Instagram</a>`);
    document.getElementById("socials").innerHTML = links.join("");

    STATE.products = data.products || [];
    STATE.current = data.current_week || null;
    buildChips();
    render();
  })
  .catch(() => {
    document.getElementById("content").innerHTML = '<div class="empty">โหลดรายการไม่สำเร็จ</div>';
  });
</script>
</body>
</html>
